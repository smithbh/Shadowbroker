services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - HOST=0.0.0.0
      - NODE_ENV=development
    command: next dev --hostname 0.0.0.0 --port 3000

